name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1: LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install
          ./node_modules/.bin/eslint app.js

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ─────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies + test tools
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ─────────────────────────────────────────────
  # STAGE 3: BUILD
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      - name: Save image SHA
        run: echo "${{ github.sha }}" > sha.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-sha
          path: sha.txt

  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t localhost/api:${{ github.sha }} ./api
          docker build -t localhost/worker:${{ github.sha }} ./worker
          docker build -t localhost/frontend:${{ github.sha }} ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          exit-code: "1"
          severity: CRITICAL
          trivy-flags: --ignore-unfixed --skip-version-check

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost/worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          exit-code: "1"
          severity: CRITICAL
          trivy-flags: --ignore-unfixed --skip-version-check

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "1"
          severity: CRITICAL
          trivy-flags: --ignore-unfixed --skip-version-check

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "REDIS_PASSWORD=testpassword" > .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            FRONTEND=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q frontend) 2>/dev/null || echo "starting")
            API=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api) 2>/dev/null || echo "starting")
            echo "Attempt $i - frontend: $FRONTEND, api: $API"
            if [ "$FRONTEND" = "healthy" ] && [ "$API" = "healthy" ]; then
              echo "All services healthy!"
              break
            fi
            sleep 5
          done

      - name: Submit a job and poll until completed
        run: |
          SUBMIT=$(curl -s -X POST http://localhost:3000/submit)
          echo "Submit response: $SUBMIT"
          JOB_ID=$(echo $SUBMIT | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in $(seq 1 15); do
            STATUS_RESP=$(curl -s http://localhost:3000/status/$JOB_ID)
            STATUS=$(echo $STATUS_RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Poll $i - status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete in time!"
          exit 1

      - name: Tear down stack (always runs)
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6: DEPLOY (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling update with health-check gate
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "$DEPLOY_KEY" > deploy_key
          chmod 600 deploy_key

          scp -i deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${DEPLOY_USER}@${DEPLOY_HOST}:/app/

          ssh -i deploy_key -o StrictHostKeyChecking=no \
            ${DEPLOY_USER}@${DEPLOY_HOST} << 'ENDSSH'
            set -e
            cd /app

            docker compose pull

            docker compose up -d --no-deps --build api
            docker compose up -d --no-deps --build worker
            docker compose up -d --no-deps --build frontend

            for SERVICE in api frontend; do
              CONTAINER=$(docker compose ps -q $SERVICE)
              echo "Waiting for $SERVICE to be healthy..."
              for i in $(seq 1 12); do
                HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER)
                echo "  $SERVICE health: $HEALTH (attempt $i/12)"
                if [ "$HEALTH" = "healthy" ]; then
                  echo "  $SERVICE is healthy."
                  break
                fi
                if [ $i -eq 12 ]; then
                  echo "  $SERVICE failed health check! Aborting."
                  docker compose up -d --no-deps $SERVICE
                  exit 1
                fi
                sleep 5
              done
            done

            echo "Deploy successful."
          ENDSSH

          rm -f deploy_key
